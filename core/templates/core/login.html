{% extends 'core/base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center bg-gradient-to-br from-indigo-50 to-blue-100 p-6">
    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-xl transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 mb-2">Welcome Back</h1>
            <p class="text-gray-500">Sign in to your GigFlow account</p>
        </div>
        
        <form method="POST" action="{% url 'login' %}" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-white/50 backdrop-blur-sm">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-white/50 backdrop-blur-sm">
            </div>
            
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-lg shadow-md hover:shadow-lg transform transition-all hover:-translate-y-1">
                Sign In
            </button>
        </form>
        
        <p class="text-center mt-6 text-sm text-gray-600">
            Don't have an account? <a href="{% url 'register' %}" class="font-medium text-blue-600 hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
